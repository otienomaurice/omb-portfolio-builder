name: Build Windows Portfolio Builder

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "builder-v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer and portable app
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.5.3"

      - name: Install desktop builder dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows artifacts
        run: pnpm run dist

      - name: Resolve release version
        id: release_meta
        shell: pwsh
        run: |
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $version = [string]$package.version
          if (-not $version) {
            throw "package.json version is required before publishing a release."
          }
          if ($env:GITHUB_REF -like "refs/tags/*") {
            $tag = $env:GITHUB_REF_NAME
          } else {
            $tag = "builder-v$version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "release_tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Require a new version for main releases
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          git fetch --tags --force
          $tag = "${{ steps.release_meta.outputs.release_tag }}"
          if (git rev-parse -q --verify "refs/tags/$tag") {
            throw "Release tag $tag already exists. Bump package.json version before merging development into main so installed apps can detect a newer release."
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OMB-Portfolio-Builder-Windows
          path: |
            dist/OMB-Portfolio-Builder-*.exe
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/builder-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: OMB Portfolio Builder ${{ steps.release_meta.outputs.release_tag }}
          make_latest: true
          files: |
            dist/OMB-Portfolio-Builder-*.exe
