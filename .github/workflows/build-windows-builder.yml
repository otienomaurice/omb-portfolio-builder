name: Build Windows Portfolio Builder

on:
  workflow_dispatch:
  push:
    tags:
      - "builder-v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer and portable app
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.5.3"

      - name: Install desktop builder dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows artifacts
        run: pnpm run dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OMB-Portfolio-Builder-Windows
          path: |
            dist/OMB-Portfolio-Builder-*.exe
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/builder-v')
        uses: softprops/action-gh-release@v2
        with:
          name: OMB Portfolio Builder ${{ github.ref_name }}
          files: |
            dist/OMB-Portfolio-Builder-*.exe
